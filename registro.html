<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro en Hotel Resort Aurora </title>
    <link rel="stylesheet" href="HotelEstilo.css">
    
</head>

<body>
    <header>
    <img id="imagen" src="./img/Hotel.jpg" width="200">    
    <h1> Registro </h1>
    <hr>
    <nav>
      <a href="hotelAurora.html">Inicio</a> |
      <a href="habitaciones.html">Habitaciones</a> |
      <a href="login.html">Iniciar sesión</a>
    </nav>
    <hr>
  </header>

  <main>
    <form action="#" method="post">
      <p>
        <label>Nombre completo:
          <input type="text" name="nombre" required>
        </label>
      </p>
      <p>
        <label>Correo:
          <input type="email" name="email" required>
        </label>
      </p>
      <p>
        <label>Contraseña:
          <input type="password" name="password" required>
        </label>
      </p>
      <p>
        <label>Confirmar contraseña:
          <input type="password" name="confirm_password" required>
        </label>
      </p>

      <p>
        <button type="submit">Crear registro</button>
      </p>
    </form>
     </main>
  <hr>
    <footer>
        <h2 class="grupo2">Un Lugar Magico</h2>
        <p>¡Con la mejor calidad!</p>
    </footer>
    
</body>

</html>
