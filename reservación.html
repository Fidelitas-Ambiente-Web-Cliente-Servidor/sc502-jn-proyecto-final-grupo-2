<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva en el Hotel Resort Aurora </title>
    <link rel="stylesheet" href="Reservacion.css">
    
</head>

<body>
    <header>
    <img id="imagen" src="./img/Hotel.jpg" width="200">  
    <h1> Reserva </h1>
    <hr>
    <nav>
      <a href="hotelAurora.html">Inicio</a> |
      <a href="habitaciones.html">Habitaciones</a> |
      <a href="reservas.html">Mis reservas</a> |
      
    </nav>
    <hr>
  </header>

  <main>

<p>Complete el formulario para realizar una reserva.</p>

    <form action="#" method="post" onsubmit="return validarFormulario()" >
      <fieldset>
        <legend>Datos de la reserva</legend>

        <p>
          <label>Fecha de entrada:
            <input type="date" name="fecha_entrada" required>
          </label>
        </p>

        <p>
          <label>Fecha de salida:
            <input type="date" name="fecha_salida" required>
          </label>
        </p>

        <p>
          <label>Tipo de habitación:
            <select name="tipo_habitacion" required>
              <option value="">Seleccione...</option>
              <option value="estandar">Estándar</option>
              <option value="deluxe">Deluxe</option>
              <option value="suite">Suite</option>
            </select>
          </label>
        </p>

        <p>
          <label>Cantidad de personas:
            <input type="number" name="personas" min="1" max="6" value="2" required>
          </label>
        </p>
      </fieldset>

      <fieldset>
        <legend>Datos del cliente</legend>

        <p>
          <label>Nombre completo:
            <input type="text" name="nombre" required>
          </label>
        </p>

        <p>
          <label>Correo:
            <input type="email" name="correo"required>
          </label>
        </p>

        <p>
          <label>Teléfono:
            <input type="tel" name="telefono">
          </label>
        </p>
      </fieldset>

      <p>
        <button type="submit">Confirmar reserva</button>
        <a href="habitaciones.html">Cancelar</a>
      </p>
    </form>

      </main>

  <hr>
    <footer>
        <a href="hotelAurora.html">Inicio</a>
        <h2 class="grupo2">Un Lugar Magico</h2>
        <p>¡Con la mejor calidad!</p>
    </footer>
    <script src="js/validarTelefono.js"></script>
</body>

</html>
